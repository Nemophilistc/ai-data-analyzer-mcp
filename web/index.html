<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Data Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f14;--surface:#1a1a24;--surface2:#242436;--border:#2a2a3e;--text:#e4e4ef;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--yellow:#fdcb6e;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:var(--accent2)}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 span{font-size:20px}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.connected{background:var(--green)}
.status-dot.disconnected{background:var(--red)}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:16px}
.sidebar h3{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface2)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-block{width:100%}
.db-info{background:var(--surface2);border-radius:8px;padding:12px;margin-top:12px;font-size:12px;line-height:1.8}
.db-info strong{color:var(--accent2)}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.message{margin-bottom:16px;max-width:85%;animation:fadeIn .3s ease}
.message.user{margin-left:auto}
.message.assistant{margin-right:auto}
.message-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word}
.message.user .message-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.message.assistant .message-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.message.system .message-bubble{background:transparent;border:1px dashed var(--border);color:var(--text2);font-size:12px;text-align:center;max-width:100%}
.tool-call{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:12px;font-family:'Fira Code',monospace;color:var(--yellow)}
.tool-result{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:12px;font-family:'Fira Code',monospace;color:var(--green);max-height:300px;overflow-y:auto;white-space:pre-wrap}
.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:8px;height:8px;background:var(--text2);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Markdown rendering */
.message.assistant .message-bubble h1,.message.assistant .message-bubble h2,.message.assistant .message-bubble h3{margin:12px 0 6px;color:var(--accent2)}
.message.assistant .message-bubble h1{font-size:18px}
.message.assistant .message-bubble h2{font-size:16px}
.message.assistant .message-bubble h3{font-size:14px}
.message.assistant .message-bubble p{margin:6px 0}
.message.assistant .message-bubble ul,.message.assistant .message-bubble ol{margin:6px 0;padding-left:20px}
.message.assistant .message-bubble li{margin:3px 0}
.message.assistant .message-bubble code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:'Fira Code',monospace;font-size:13px}
.message.assistant .message-bubble pre{background:var(--surface2);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.message.assistant .message-bubble pre code{background:none;padding:0}
.message.assistant .message-bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.message.assistant .message-bubble th,.message.assistant .message-bubble td{padding:6px 10px;border:1px solid var(--border);text-align:left}
.message.assistant .message-bubble th{background:var(--surface2);font-weight:600}
.message.assistant .message-bubble strong{color:var(--accent2)}
.message.assistant .message-bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Input area */
.input-area{border-top:1px solid var(--border);padding:16px 20px;background:var(--surface);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .2s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text2)}
.send-btn{width:44px;height:44px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.examples{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.examples button{padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.examples button:hover{border-color:var(--accent);color:var(--text)}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .message{max-width:95%}
}
</style>
</head>
<body>

<div class="header">
  <h1><span>🔍</span> AI Data Analyzer</h1>
  <div class="header-right">
    <span id="provider-badge"></span>
    <span><span class="status-dot" id="db-status"></span> <span id="db-status-text">未连接</span></span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <h3>数据库连接</h3>
    <div class="form-group">
      <label>数据库类型</label>
      <select id="db-type">
        <option value="sqlite">SQLite</option>
        <option value="postgresql">PostgreSQL</option>
      </select>
    </div>
    <div class="form-group" id="sqlite-group">
      <label>文件路径</label>
      <input type="text" id="db-path" placeholder="e.g. /path/to/data.db">
    </div>
    <div class="form-group" id="pg-group" style="display:none">
      <label>连接字符串</label>
      <input type="text" id="db-conn" placeholder="postgres://user:pass@host:5432/db">
    </div>
    <button class="btn btn-primary btn-block" id="connect-btn">连接数据库</button>
    <div class="db-info" id="db-info" style="display:none"></div>

    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border)">
      <h3>快捷操作</h3>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
        <button class="btn btn-block" style="background:var(--surface2);color:var(--text);text-align:left;font-size:12px" onclick="sendQuick('帮我做一次数据体检')">📊 数据体检</button>
        <button class="btn btn-block" style="background:var(--surface2);color:var(--text);text-align:left;font-size:12px" onclick="sendQuick('发现数据中的隐藏模式和趋势')">🔍 发现洞察</button>
        <button class="btn btn-block" style="background:var(--surface2);color:var(--text);text-align:left;font-size:12px" onclick="sendQuick('分析这个数据库的结构和业务领域')">📋 分析 Schema</button>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="message system">
        <div class="message-bubble">欢迎使用 AI Data Analyzer! 请先在左侧连接数据库，或直接用自然语言提问。</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
        <button class="send-btn" id="send-btn" title="发送">&#10148;</button>
      </div>
      <div class="examples" id="examples">
        <button onclick="sendQuick('连接数据库 ./data.db 并分析')">连接并分析</button>
        <button onclick="sendQuick('这个数据库有多少张表？每张表有多少数据？')">查看概览</button>
        <button onclick="sendQuick('帮我做一次全面的数据质量检查')">质量检查</button>
      </div>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const connectBtn = document.getElementById('connect-btn');
const dbType = document.getElementById('db-type');
const dbPath = document.getElementById('db-path');
const dbConn = document.getElementById('db-conn');
const sqliteGroup = document.getElementById('sqlite-group');
const pgGroup = document.getElementById('pg-group');
const dbInfo = document.getElementById('db-info');
const dbStatus = document.getElementById('db-status');
const dbStatusText = document.getElementById('db-status-text');
const providerBadge = document.getElementById('provider-badge');
const examplesEl = document.getElementById('examples');

let history = [];
let isLoading = false;

// Init config
fetch('/api/config').then(r => r.json()).then(cfg => {
  providerBadge.textContent = cfg.provider + ' / ' + cfg.model;
  providerBadge.style.cssText = 'font-size:11px;padding:3px 8px;background:var(--surface2);border-radius:12px';
  if (cfg.databaseConnected) {
    setDbConnected(cfg.databaseInfo);
  }
});

// DB type toggle
dbType.addEventListener('change', () => {
  const isSqlite = dbType.value === 'sqlite';
  sqliteGroup.style.display = isSqlite ? '' : 'none';
  pgGroup.style.display = isSqlite ? 'none' : '';
});

// Connect
connectBtn.addEventListener('click', async () => {
  const type = dbType.value;
  const path = dbPath.value.trim();
  const conn = dbConn.value.trim();

  if (type === 'sqlite' && !path) { alert('请输入 SQLite 文件路径'); return; }
  if (type === 'postgresql' && !conn) { alert('请输入 PostgreSQL 连接字符串'); return; }

  connectBtn.disabled = true;
  connectBtn.textContent = '连接中...';

  try {
    const msg = type === 'sqlite'
      ? `Connect to SQLite database at ${path}`
      : `Connect to PostgreSQL: ${conn}`;

    const res = await sendToAPI(msg);
    addMessage('assistant', res.content);

    // Check if connected
    const cfg = await fetch('/api/config').then(r => r.json());
    if (cfg.databaseConnected) setDbConnected(cfg.databaseInfo);
  } catch (err) {
    addMessage('system', '连接失败: ' + err.message);
  } finally {
    connectBtn.disabled = false;
    connectBtn.textContent = '连接数据库';
  }
});

function setDbConnected(info) {
  dbStatus.className = 'status-dot connected';
  dbStatusText.textContent = '已连接';
  if (info) {
    dbInfo.style.display = '';
    dbInfo.innerHTML = `<strong>${info.name || info.type}</strong><br>类型: ${info.type}<br>表: ${info.tables} 张<br>总行数: ${info.totalRows?.toLocaleString() || 'N/A'}`;
  }
}

// Send message
async function send() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  setLoading(true);

  try {
    const res = await sendToAPI(text);
    addMessage('assistant', res.content);
  } catch (err) {
    addMessage('system', '请求失败: ' + err.message);
  } finally {
    setLoading(false);
  }
}

async function sendToAPI(message) {
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, history }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: 'Unknown error' }));
    throw new Error(err.error || `HTTP ${response.status}`);
  }

  const data = await response.json();
  history.push({ role: 'user', content: message });
  history.push({ role: 'assistant', content: data.content });

  // Keep history manageable
  if (history.length > 20) history = history.slice(-20);

  return data;
}

function sendQuick(text) {
  inputEl.value = text;
  send();
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = role === 'user' ? escapeHtml(content) : renderMarkdown(content);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setLoading(on) {
  isLoading = on;
  sendBtn.disabled = on;
  if (on) {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } else {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Tables
  html = html.replace(/^\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/gm, (match, header, body) => {
    const headers = header.split('|').map(h => h.trim()).filter(Boolean);
    const rows = body.trim().split('\n').map(row =>
      row.split('|').map(c => c.trim()).filter(Boolean)
    );
    let table = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    for (const row of rows) {
      table += '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>';
    }
    table += '</tbody></table>';
    return table;
  });

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Lists
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<table>)/g, '$1');
  html = html.replace(/(<\/table>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<hr>)<\/p>/g, '$1');

  return html;
}

// Event listeners
sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
